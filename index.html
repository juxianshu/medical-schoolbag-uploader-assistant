		<style>
			body {
				font-family: Arial, sans-serif;
				max-width: 800px;
				margin: 0 auto;

				background-color: white;

				color: #333;
				text-align: center;

				margin-bottom: 20px;

				display: block;
				margin-bottom: 5px;

			input[type="file"],
			select {

				padding: 5px;
			}

				cursor: pointer;
				/* 鼠标放上去显示手型，提示可点击 */
			}

			button {
				background-color: #007bff;
				color: white;
				padding: 12px 24px;
				border: none;
				border-radius: 4px;

				width: 100%;
			}

				background-color: #0056b3;
			}

			button:disabled {
				background-color: #ccc;
				cursor: not-allowed;

				margin-top: 20px;
				padding: 15px;
				border-radius: 4px;
				display: none;
			}

				color: #155724;
				border: 1px solid #c3e6cb;
			}

			.error {
				background-color: #f8d7da;
				color: #721c24;
				border: 1px solid #f5c6cb;
			}

			.info {
				background-color: #d1ecf1;
				color: #0c5460;
				border: 1px solid #bee5eb;

	<body>
		<div class="container">
			<h1>大医病理科规培病例上传模板转换工具</h1>

			<div class="form-group">
				<label for="sourceFile">选择源数据文件 (.xls/.xlsx):</label>
				<input type="file" id="sourceFile" accept=".xls,.xlsx">
			</div>

			<div class="form-group">
				<label for="name">姓名:</label>
				<input type="text" id="name" value="">
			</div>

			<div class="form-group">
				<label for="secondCategory">二级分类:</label>
				<input type="text" id="secondCategory" value="门诊诊治">
			</div>

			<div class="form-group">
				<label for="visitType">就诊类型:</label>
				<select id="visitType">
					<option value="首诊">首诊</option>
				</select>
			</div>

			<div class="form-group">
				<label for="primaryDiagnosis">主要诊断:</label>
				<!-- 将 input 换成 select，id 保持不变以便 JS 获取 -->
				<select id="primaryDiagnosis">
					<option value="">-- 请选择诊断 --</option>
					<option value="外阴感染性病变及鳞状上皮病变，宫颈炎、宫颈息肉、宫颈鳞状上皮内病变、宫颈癌、子宫内膜增生性病变、内膜息肉、内膜癌、内膜间质肿瘤">
						外阴感染性病变及鳞状上皮病变，宫颈炎、宫颈息肉、宫颈鳞状上皮内病变、宫颈癌、子宫内膜增生性病变、内膜息肉、内膜癌、内膜间质肿瘤</option>
					<option value="肺肉芽肿性疾病、肺常见良性肿瘤、各类型肺癌、胸腺瘤">肺肉芽肿性疾病、肺常见良性肿瘤、各类型肺癌、胸腺瘤</option>
					<option value="Baret食管、食管癌；慢性胃炎、胃溃疡、常见胃息肉、胃癌前病变、胃癌">Baret食管、食管癌；慢性胃炎、胃溃疡、常见胃息肉、胃癌前病变、胃癌</option>
					<option value="肾常见肿瘤">肾常见肿瘤</option>
					<option value="软组织常见良性及恶性肿瘤">软组织常见良性及恶性肿瘤</option>
					<option value="反应性增生、常见炎性疾病">反应性增生、常见炎性疾病</option>
					<option value="常见甲状腺炎性疾病、结节性甲状腺肿、滤泡腺瘤、乳头状癌、滤泡癌、甲状旁腺增生、肾上腺皮髓质增生及肿瘤、垂体腺瘤、胰岛素瘤">
						常见甲状腺炎性疾病、结节性甲状腺肿、滤泡腺瘤、乳头状癌、滤泡癌、甲状旁腺增生、肾上腺皮髓质增生及肿瘤、垂体腺瘤、胰岛素瘤</option>
					<option value="皮肤病基本病理改变">皮肤病基本病理改变</option>
					<option value="喉常见炎性疾病及肿瘤">喉常见炎性疾病及肿瘤</option>
					<option value="常见神经上皮肿瘤">常见神经上皮肿瘤</option>
					<option value="心肌病">心肌病</option>
				</select>
			</div>

			<div class="form-group">
				<label for="isRescue">是否抢救:</label>
				<input type="text" id="isRescue" value="否">
			</div>

			<button id="processBtn">处理并下载结果</button>

			<div id="status" class="status"></div>
		</div>

		<script>
			// 页面加载时：读取本地存储的数据
			window.addEventListener('DOMContentLoaded', () => {
				const savedData = {
					name: localStorage.getItem('excel_tool_name'),
					secondCategory: localStorage.getItem('excel_tool_secondCategory'),
					visitType: localStorage.getItem('excel_tool_visitType'),
					primaryDiagnosis: localStorage.getItem('excel_tool_primaryDiagnosis'),
					isRescue: localStorage.getItem('excel_tool_isRescue')
				};

				// 将数据回填到输入框
				if (savedData.name) document.getElementById('name').value = savedData.name;
				if (savedData.secondCategory) document.getElementById('secondCategory').value = savedData.secondCategory;
				if (savedData.visitType) document.getElementById('visitType').value = savedData.visitType;
				if (savedData.primaryDiagnosis) document.getElementById('primaryDiagnosis').value = savedData.primaryDiagnosis;
				if (savedData.isRescue) document.getElementById('isRescue').value = savedData.isRescue;
			});

			// 点击按钮事件
			document.getElementById('processBtn').addEventListener('click', async function() {
				const sourceFileInput = document.getElementById('sourceFile');
				const name = document.getElementById('name').value;
				const secondCategory = document.getElementById('secondCategory').value;
				const visitType = document.getElementById('visitType').value;
				const primaryDiagnosis = document.getElementById('primaryDiagnosis').value;
				const isRescue = document.getElementById('isRescue').value;

				const statusDiv = document.getElementById('status');

				if (!sourceFileInput.files.length) {
					showStatus('请选择源数据文件！', 'error');
					return;
				}

				// 检查其他必填输入项是否为空
				if (!name || !secondCategory || !visitType || !primaryDiagnosis || !isRescue) {
					showStatus('请填写所有必填项！', 'error');
					return;
				}

				// 处理成功前保存到本地存储
				localStorage.setItem('excel_tool_name', name);
				localStorage.setItem('excel_tool_secondCategory', secondCategory);
				localStorage.setItem('excel_tool_visitType', visitType);
				localStorage.setItem('excel_tool_primaryDiagnosis', primaryDiagnosis);
				localStorage.setItem('excel_tool_isRescue', isRescue);

				try {
					showStatus('正在处理文件...', 'info');

					const file = sourceFileInput.files[0];
					const data = await readFileAsArrayBuffer(file);
					const workbook = XLSX.read(data, {
						type: 'array'
					});

					// 获取第一个工作表
					const firstSheetName = workbook.SheetNames[0];
					const worksheet = workbook.Sheets[firstSheetName];

					// 将工作表转换为 JSON
					let jsonData = XLSX.utils.sheet_to_json(worksheet, {
						header: 1
					});

					// 假设第一行为标题，过滤掉最后一行统计信息
					const headers = jsonData[0];
					const dataRows = jsonData.slice(1, -1); // 去掉第一行标题和最后一行统计

					// 查找所需列的索引
					const medicalRecordNoIndex = headers.indexOf('住院号');
					const patientNameIndex = headers.indexOf('姓名');
					const visitDateIndex = headers.indexOf('登记时间'); // 假设日期列为"登记时间"

					if (medicalRecordNoIndex === -1 || patientNameIndex === -1 || visitDateIndex === -1) {
						throw new Error('源文件缺少必要的列：住院号、姓名、登记时间');
					}

					const ALL_COLUMNS = [
						"姓名*", "手机号", "转计划开始时间*", "二级分类*", "医师类型",
						"病历号*", "病人姓名*", "是否对应HIS系统患者", "床位号", "是否对应HIS系统病例",
						"就诊日期*", "就诊类型*", "主要诊断*", "次要诊断", "内容",
						"全程管理", "入院日期", "出院日期", "书写大病历", "是否肛肠专科住院志",
						"参与角色", "是否抢救*", "抢救内容", "转归情况", "望闻问切",
						"辅助检查", "处方", "医嘱"
					];

					// --- 创建一个索引映射表 ---
					const COLUMN_INDEX = {};
					ALL_COLUMNS.forEach((colName, index) => {
						COLUMN_INDEX[colName] = index;
					});

					// 创建新数据
					const newRows = [];
					
					// 使用 Set 作为哈希表来存储已经出现过的病历号
					const seenMedicalRecordNos = new Set();
					let duplicateCount = 0; // 计数器
					
					dataRows.forEach(row => {
						const medicalRecordNo = row[medicalRecordNoIndex];
						const patientName = row[patientNameIndex];
						let visitDate = formatExcelDate(row[visitDateIndex]);

						// 如果病历号为空，或者已经在 Set 中存在，则跳过该行（只保留第一次出现的）
						if (!medicalRecordNo || seenMedicalRecordNos.has(medicalRecordNo)) {
							duplicateCount++; // 发现重复，计数+1
							return; // 直接结束当前循环，不执行后面的添加操作
						}
						seenMedicalRecordNos.add(medicalRecordNo);

						// 计算计划开始日期 (月份的第一天)
						const planStartDate = getFirstDayOfMonth(visitDate);

						// 创建新行数据
						const newRow = new Array(ALL_COLUMNS.length).fill("");

						newRow[COLUMN_INDEX["姓名*"]] = name;
						newRow[COLUMN_INDEX["转计划开始时间*"]] = planStartDate;
						newRow[COLUMN_INDEX["二级分类*"]] = secondCategory;
						newRow[COLUMN_INDEX["病历号*"]] = medicalRecordNo;
						newRow[COLUMN_INDEX["病人姓名*"]] = patientName;
						newRow[COLUMN_INDEX["就诊日期*"]] = visitDate;
						newRow[COLUMN_INDEX["就诊类型*"]] = visitType;
						newRow[COLUMN_INDEX["主要诊断*"]] = primaryDiagnosis;
						newRow[COLUMN_INDEX["是否抢救*"]] = isRescue;

						newRows.push(newRow);
					});

					// 创建结果工作簿
					const resultWorkbook = XLSX.utils.book_new();

					// 准备最终数据：标题行 + 列名行 + 数据行
					const titleRow = ["登记手册病种数据模板（版本：6.4.220913）"];
					// for (let i = 1; i < 9; i++) titleRow.push(""); // 补齐到9列

					const columnHeaders = ALL_COLUMNS;

					const finalData = [titleRow, columnHeaders, ...newRows];

					const resultWorksheet = XLSX.utils.aoa_to_sheet(finalData, {
						header: 1
					});
					XLSX.utils.book_append_sheet(resultWorkbook, resultWorksheet, "Sheet1");

					// 组成文件名 生成并下载文件
					const diagnosisPrefix = primaryDiagnosis ? primaryDiagnosis.substring(0, 5) : "未知诊断";
					const dynamicFileName = `${name}_${diagnosisPrefix}_批量导入.xls`;
					XLSX.writeFile(resultWorkbook, dynamicFileName);

					showStatus(`✅ 处理完成！共处理 ${newRows.length} 条记录（已自动去重 ${duplicateCount} 条）。文件已下载。`, 'success');

				} catch (error) {
					console.error('处理文件时出错:', error);
					showStatus(`❌ 处理失败: ${error.message}`, 'error');
				}
			});

			function readFileAsArrayBuffer(file) {
				return new Promise((resolve, reject) => {
					const reader = new FileReader();
					reader.onload = e => resolve(e.target.result);
					reader.onerror = e => reject(new Error('读取文件失败'));
					reader.readAsArrayBuffer(file);
				});
			}

			function getFirstDayOfMonth(dateStr) {
				const parts = dateStr.split('/');
				if (parts.length >= 2) {
					return `${parts[0]}/${parts[1]}/01`;
				}
				return dateStr;
			}

			function showStatus(message, type) {
				const statusDiv = document.getElementById('status');
				statusDiv.textContent = message;
				statusDiv.className = `status ${type}`;
				statusDiv.style.display = 'block';

				// 5秒后隐藏状态信息
				setTimeout(() => {
					statusDiv.style.display = 'none';
				}, 5000);
			}

			/**
			 * 将 Excel 的序列号（数字）或日期对象转换为 "YYYY/MM/DD" 字符串
			 * @param {number|Date|string} excelDate - 可能是数字、Date对象或字符串
			 * @returns {string} 格式化后的日期，例如 "2026/04/19"
			 */
			function formatExcelDate(excelDate) {
				if (!excelDate) return "";

				// 情况 A: 如果是数字 (例如 46120.37...)
				if (typeof excelDate === 'number') {
					// Excel 日期基准是 1899-12-30 (注意不是 1900-01-01，这是为了兼容 Lotus 1-2-3 的 bug)
					// 86400000 是一天的毫秒数
					const dateObj = new Date((excelDate - 25569) * 86400 * 1000);

					const y = dateObj.getFullYear();
					const m = (dateObj.getMonth() + 1).toString().padStart(2, '0');
					const d = dateObj.getDate().toString().padStart(2, '0');
					return `${y}/${m}/${d}`;
				}

				// 情况 B: 如果已经是 Date 对象
				if (excelDate instanceof Date) {
					const y = excelDate.getFullYear();
					const m = (excelDate.getMonth() + 1).toString().padStart(2, '0');
					const d = excelDate.getDate().toString().padStart(2, '0');
					return `${y}/${m}/${d}`;
				}

				// 情况 C: 如果已经是字符串 (防止误判)
				// 简单处理：把横杠换成斜杠，去掉时间部分
				if (typeof excelDate === 'string') {
					return excelDate.replace(/-/g, '/').split(' ')[0];
				}

				return String(excelDate);
			}
		</script>
	</body>
